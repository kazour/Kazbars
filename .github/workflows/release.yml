name: Release
on:
  push:
    tags: ['v[0-9]*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build
        run: uv run pyinstaller kazbars.spec

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/KazBars" -DestinationPath "KazBars.zip" -Force

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash "KazBars.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  KazBars.zip" | Out-File -Encoding ascii -NoNewline "KazBars.zip.sha256"

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: KazBars ${{ github.ref_name }}
          body_path: .github/release-notes.md
          files: |
            KazBars.zip
            KazBars.zip.sha256

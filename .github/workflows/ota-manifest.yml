name: OTA Manifest

# Push to main = live. The manifest is generated locally as part of any
# stock-buff-file change (scripts/gen_manifest.py; the pre-commit pytest gate
# won't let the change land without it). This job only VERIFIES that the
# committed manifest is up to date — it regenerates and fails on drift. It does
# NOT commit back, so it never fights branch protection. Payload URLs point at
# the main ref; integrity is the per-payload sha256, which the client checks
# before applying.

on:
  push:
    branches: [main]
    paths:
      - 'src/kazbars/assets/kazbars/Database.json'
      - 'src/kazbars/assets/kazbars/Default.json'

permissions:
  contents: read

jobs:
  verify-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # No notes arg => preserves the committed notes, so a clean tree means the
      # committed manifest + baseline already match a fresh generation.
      - name: Verify OTA manifest is up to date
        run: |
          python scripts/gen_manifest.py
          if ! git diff --quiet -- ota/manifest.json src/kazbars/__init__.py; then
            echo "::error::ota/manifest.json or CONTENT_BASELINE_VERSION is stale — run 'python scripts/gen_manifest.py \"notes\"' and commit the result."
            git --no-pager diff -- ota/manifest.json src/kazbars/__init__.py
            exit 1
          fi
          echo "OTA manifest is up to date."

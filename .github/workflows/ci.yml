name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      # Lint only — the formatter is intentionally not enforced (single-quote
      # codebase vs quote-style="double"); mirrors .pre-commit-config.yaml.
      - name: Lint
        run: uv run ruff check src tests

      # Blocking: the Tk-free logic core (the `files` list in [tool.mypy]) must
      # stay type-clean. A regression here fails CI.
      - name: Type check (core, blocking)
        run: uv run mypy

      # Advisory: the full repo, including the Tk/ttkbootstrap UI modules whose
      # dynamic widget typing emits errors mypy can't resolve. Surfaced for
      # visibility but never fails the build.
      - name: Type check (full repo, advisory)
        run: uv run mypy src/kazbars
        continue-on-error: true

      - name: Tests
        run: uv run pytest -v

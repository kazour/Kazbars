name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      # Lint only — the formatter is intentionally not enforced (single-quote
      # codebase vs quote-style="double"); mirrors .pre-commit-config.yaml.
      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy src/kazbars
        continue-on-error: true

      - name: Tests
        run: uv run pytest -v
